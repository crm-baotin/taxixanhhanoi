<link rel="stylesheet" href="https://unpkg.com/@goongmaps/goong-js/dist/goong-js.css">
<script src="https://unpkg.com/@goongmaps/goong-js/dist/goong-js.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mapbox/polyline@1.1.1/src/polyline.js"></script>

<script>
(function(){

const MAP_KEY="6SDBytP432zlGVgI9KZSm5yQUZP6HLEhQh8xvWz2";
const API_KEY="6aIBLxt2RJZasvfS1JWXgc1uvgARinQczQluqC07";
const BOT_TOKEN="8213846644:AAG_Mom7MRzH97Y_-c7KQocQ0VS9qqf3mIc";
const CHAT_ID="6663298744";

function el(id){return document.getElementById(id)}

let map=null,markerA=null,markerB=null;
let pickupCoord=null,dropoffCoord=null,pickMode=null;

function gia(k){
if(k<=3.5)return 30000;
if(k<=19)return 30000+(k-3.5)*9000;
if(k<=50)return 169500+(k-19)*8000;
if(k<=100)return 417500+(k-50)*7000;
return 767500+(k-100)*6000;
}

function showFare(km,t){
el("fareText").innerHTML=t+" • "+km.toFixed(2)+" km";
el("farePrice").innerHTML=Math.round(gia(km)).toLocaleString("vi-VN")+"đ";
}

function initMap(){
goongjs.accessToken=MAP_KEY;

map=new goongjs.Map({
container:"taxiMap",
style:"https://tiles.goong.io/assets/goong_map_web.json",
center:[105.8342,21.0278],
zoom:12
});

map.addControl(new goongjs.NavigationControl());

map.on("click",async function(e){
if(!pickMode)return;

const lng=e.lngLat.lng;
const lat=e.lngLat.lat;

setMarker(pickMode,lng,lat);

try{
const r=await fetch("https://rsapi.goong.io/Geocode?latlng="+lat+","+lng+"&api_key="+API_KEY);
const d=await r.json();

if(d.results&&d.results[0]){
if(pickMode==="pickup") el("pickup").value=d.results[0].formatted_address;
else el("dropoff").value=d.results[0].formatted_address;
}
}catch(err){}

pickMode=null;
el("btnPickA").classList.remove("modeOn");
el("btnPickB").classList.remove("modeOn");

});
}

function setMarker(type,lng,lat){

if(type==="pickup"){
if(markerA)markerA.remove();
markerA=new goongjs.Marker({color:"#14b8a6"}).setLngLat([lng,lat]).addTo(map);
pickupCoord=[lng,lat];
}

if(type==="dropoff"){
if(markerB)markerB.remove();
markerB=new goongjs.Marker({color:"#ef4444"}).setLngLat([lng,lat]).addTo(map);
dropoffCoord=[lng,lat];
}
}

async function autoSearch(q,box,input,type){

if(q.length<3){
el(box).innerHTML="";
return;
}

try{
const r=await fetch(
"https://rsapi.goong.io/Place/AutoComplete?api_key="+API_KEY+
"&input="+encodeURIComponent(q)
);

const d=await r.json();

let html="";
(d.predictions||[]).slice(0,5).forEach(i=>{
html+=`<div onclick="pickPlace('${i.place_id}','${box}','${input}','${type}')">${i.description}</div>`;
});

el(box).innerHTML=html?'<div class="suggest">'+html+'</div>':'';

}catch(err){}
}

window.pickPlace=async function(pid,box,input,type){

try{
const r=await fetch("https://rsapi.goong.io/Place/Detail?place_id="+pid+"&api_key="+API_KEY);
const d=await r.json();
const x=d.result;

el(input).value=x.formatted_address;
el(box).innerHTML="";
setMarker(type,x.geometry.location.lng,x.geometry.location.lat);

map.flyTo({center:[x.geometry.location.lng,x.geometry.location.lat],zoom:15});

}catch(err){}
};

async function calcRoute(){

if(!pickupCoord || !dropoffCoord){
alert("Chọn đủ điểm đón và điểm đến");
return;
}

try{

const r=await fetch(
"https://rsapi.goong.io/Direction?origin="+pickupCoord[1]+","+pickupCoord[0]+
"&destination="+dropoffCoord[1]+","+dropoffCoord[0]+
"&vehicle=car&api_key="+API_KEY
);

const d=await r.json();
if(!d.routes || !d.routes[0]){
alert("Không tìm thấy tuyến");
return;
}

const route=d.routes[0];
const km=route.legs[0].distance.value/1000;
showFare(km,"Theo lộ trình");

const decoded=polyline.decode(route.overview_polyline.points);
const coords=decoded.map(p=>[p[1],p[0]]);

if(map.getLayer("routeLine")) map.removeLayer("routeLine");
if(map.getSource("routeLine")) map.removeSource("routeLine");

map.addSource("routeLine",{
type:"geojson",
data:{type:"Feature",geometry:{type:"LineString",coordinates:coords}}
});

map.addLayer({
id:"routeLine",
type:"line",
source:"routeLine",
paint:{"line-color":"#14b8a6","line-width":6},
layout:{"line-cap":"round","line-join":"round"}
});

const bounds=new goongjs.LngLatBounds();
coords.forEach(c=>bounds.extend(c));
map.fitBounds(bounds,{padding:40});

}catch(err){
alert("Lỗi tính tuyến");
}
}

function locateMe(){
navigator.geolocation.getCurrentPosition(async function(pos){

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

setMarker("pickup",lng,lat);

try{
const r=await fetch("https://rsapi.goong.io/Geocode?latlng="+lat+","+lng+"&api_key="+API_KEY);
const d=await r.json();
if(d.results&&d.results[0]) el("pickup").value=d.results[0].formatted_address;
}catch(err){}

map.flyTo({center:[lng,lat],zoom:15});

},function(){
alert("Không lấy được vị trí");
});
}

function bind(){

el("pickup").oninput=function(){
autoSearch(this.value,"pickupBox","pickup","pickup");
};

el("dropoff").oninput=function(){
autoSearch(this.value,"dropoffBox","dropoff","dropoff");
};

el("btnLocate").onclick=locateMe;

el("btnPickA").onclick=function(){
pickMode="pickup";
this.classList.add("modeOn");
el("btnPickB").classList.remove("modeOn");
};

el("btnPickB").onclick=function(){
pickMode="dropoff";
this.classList.add("modeOn");
el("btnPickA").classList.remove("modeOn");
};

el("btnRoute").onclick=calcRoute;

el("btnKm").onclick=function(){
let km=parseFloat(el("kmInput").value);
if(!km)return;
showFare(km,"Tính theo km");
};

el("bookNow").onclick=async function(){

let sdt=el("phoneBook").value.trim();
if(!sdt){
alert("Nhập số điện thoại");
return;
}

/* CHỐNG SPAM 3 PHÚT */
let key="book_"+sdt;
let last=localStorage.getItem(key);

if(last){
let diff=(Date.now()-parseInt(last))/1000;

if(diff < 180){
window.location.href="/limit/";
return;
}
}

let don=el("pickup").value || "Chưa nhập";
let den=el("dropoff").value || "Chưa nhập";
let km=el("fareText").innerText;
let gia=el("farePrice").innerText;

let msg=
"🚕 ĐẶT XE MỚI\n\n"+
"📍 Điểm đón: "+don+"\n"+
"📌 Điểm đến: "+den+"\n"+
"📏 "+km+"\n"+
"💰 Giá tiền: "+gia+"\n"+
"📞 SĐT khách: "+sdt;

try{

const body=new URLSearchParams();
body.append("chat_id",CHAT_ID);
body.append("text",msg);

const r=await fetch(
"https://api.telegram.org/bot"+BOT_TOKEN+"/sendMessage",
{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:body.toString()
}
);

const data=await r.json();

if(data.ok){
localStorage.setItem(key,Date.now());
window.location.href="/success/";
}else{
window.location.href="/limit/";
}

}catch(err){
window.location.href="/limit/";
}

};

}

setTimeout(function(){
initMap();
bind();
},500);

})();
</script>
